<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نظام جادون | الرئيسية</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 250px;
      background-color: #2c3e50;
      color: white;
      padding: 10px;
      overflow-y: auto;
    }
    .sidebar h3 {
      border-bottom: 1px solid #7f8c8d;
      padding-bottom: 5px;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    .sidebar li {
      padding: 8px;
      cursor: pointer;
    }
    .sidebar li:hover {
      background-color: #34495e;
    }
    .content {
      flex-grow: 1;
      padding: 20px;
      background-color: #ecf0f1;
      overflow-y: auto;
    }
    .module-title {
      font-size: 20px;
      margin-bottom: 15px;
    }
    .module-items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .module-item {
      background: white;
      padding: 15px;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .module-item:hover {
      background-color: #f0f9ff;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h3>القائمة الرئيسية</h3>
    <ul>
      <li onclick="window.location.href='http://127.0.0.1:8000/admin'">الحسابات</li>
      <li onclick="loadModule('purchases')">المشتريات</li>
      <li onclick="loadModule('sales')">المبيعات</li>
      <li onclick="loadModule('inventory')">المخزون</li>
      <li onclick="loadModule('treasury')">الخزينة</li>
      <li onclick="loadModule('manufacturing')">التصنيع</li>
    </ul>
  </div>

  <div class="content" id="module-content">
    <div class="module-title">مرحبًا بك في نظام جادون</div>
    <p>اختر موديول من القائمة الجانبية لاستعراض مكوناته.</p>
  </div>

  <script>
    const modules = {
      accounts: {
        title: "الحسابات",
        items: ["شجرة الحسابات", "القيود اليومية", "ميزان المراجعة", "حساب الأستاذ", "الأرصدة الافتتاحية"]
      },
      purchases: {
        title: "المشتريات",
        items: ["فواتير المشتريات", "مردودات المشتريات", "سداد المورد", "تقارير الموردين", "أعمار ديون الموردين"]
      },
      sales: {
        title: "المبيعات",
        items: ["فواتير المبيعات", "مردودات المبيعات", "سداد العملاء", "تقارير العملاء", "أعمار ديون العملاء"]
      },
      inventory: {
        title: "المخزون",
        items: ["تعريف المنتجات", "الوحدات", "حركات المخزون", "رصيد أول المدة", "تقارير الجرد"]
      },
      treasury: {
        title: "الخزينة",
        items: ["سندات القبض", "سندات الصرف", "كشف حساب الصندوق", "تقرير حركة الخزينة"]
      },
      manufacturing: {
        title: "التصنيع",
        items: ["شجرة المواد", "أوامر الإنتاج", "التكاليف المقدرة", "حركات المواد"]
      }
    };

    function loadModule(moduleName) {
      const module = modules[moduleName];
      const contentDiv = document.getElementById("module-content");
      contentDiv.innerHTML = `<div class="module-title">${module.title}</div>
        <div class="module-items">
          ${module.items.map(item => `<div class="module-item">${item}</div>`).join('')}
        </div>`;
    }
  </script>

</body>
</html>
