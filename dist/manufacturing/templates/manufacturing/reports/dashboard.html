{% extends 'admin/base_site.html' %}
{% load static %}

{% block content %}
<style>
    .reports-container {
        display: flex;
        height: 80vh;
        border: 1px solid #ccc;
        border-radius: 5px;
        overflow: hidden;
    }

    .reports-sidebar {
        width: 250px;
        background-color: #f9f9f9;
        border-left: 1px solid #ccc;
        padding: 15px;
    }

    .reports-sidebar h3 {
        margin-top: 0;
    }

    .reports-sidebar a {
        display: block;
        margin-bottom: 10px;
        color: #0645AD;
        text-decoration: none;
        font-size: 15px;
        cursor: pointer;
    }

    .reports-sidebar a:hover {
        text-decoration: underline;
    }

    .reports-content {
        flex: 1;
        padding: 0;
        position: relative;
    }

    .reports-content iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .report-buttons {
        margin: 10px 0;
    }

    .report-buttons button {
        margin-right: 10px;
    }
</style>

<h1>📊 تقارير التصنيع</h1>

<div class="report-buttons">
    <a href="{% url 'admin:index' %}" class="button default">🔙 العودة للوحة التحكم</a>
    <button onclick="refreshReport()" class="button default">🔄 تحديث التقرير</button>
</div>

<div class="reports-container">
    <div class="reports-sidebar">
        <h3>القائمة</h3>
        <a onclick="loadReport('{% url 'manufacturing:production_orders_report' %}')">📝 أوامر الإنتاج</a>
        <a onclick="loadReport('{% url 'manufacturing:raw_materials_report' %}')">📦 المواد الخام</a>
        <a onclick="loadReport('{% url 'manufacturing:finished_products_report' %}')">🏭 المنتجات التامة</a>
        <a onclick="loadReport('{% url 'manufacturing:scrap_report' %}')">🔥 الهالك والفاقد</a>
        <a onclick="loadReport('{% url 'manufacturing:estimated_costs_report' %}')">💸 التكاليف المقدرة</a>
    </div>
    <div class="reports-content">
        <iframe id="reportFrame" src=""></iframe>
    </div>
</div>

<script>
    // تحميل أول تقرير تلقائيًا
    document.addEventListener("DOMContentLoaded", function() {
        loadReport("{% url 'manufacturing:production_orders_report' %}");
    });

    function loadReport(url) {
        document.getElementById("reportFrame").src = url;
        sessionStorage.setItem("currentReportUrl", url);
    }

    function refreshReport() {
        const url = sessionStorage.getItem("currentReportUrl");
        if (url) {
            document.getElementById("reportFrame").src = url;
        }
    }
</script>
{% endblock %}
