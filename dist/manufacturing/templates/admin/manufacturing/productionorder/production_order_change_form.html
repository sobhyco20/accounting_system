{% extends "admin/change_form.html" %}

{% block content %}
  {{ block.super }}

  <script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector('form');
        
        // زر حفظ وتحديث BOM
        const bomButton = document.createElement("button");
        bomButton.type = "submit";
        bomButton.name = "_save_and_continue_editing_bom";
        bomButton.textContent = "💾 حفظ وانتقل لتحديث BOM";
        bomButton.className = "default";
        bomButton.style = "margin: 15px 0; background-color: #28a745; color: white; padding: 8px 12px; border-radius: 4px; border: none;";
        const qtyField = document.querySelector('#id_quantity');
        if (qtyField) {
            qtyField.parentElement.parentElement.insertAdjacentElement("afterend", bomButton);
        }

        // تحديث BOM تلقائيًا إذا وُجد update_bom=1 في الرابط
        function update_bom(productId, quantity) {
            fetch(`/manufacturing/update_bom/${productId}/${quantity}/`)
                .then(response => response.json())
                .then(data => {
                    location.reload();  // إعادة تحميل النموذج بعد التحديث
                });
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get("update_bom") === "1") {
            const productSelect = document.querySelector('#id_product');
            const quantityInput = document.querySelector('#id_quantity');
            if (productSelect && quantityInput) {
                update_bom(productSelect.value, quantityInput.value);
            }
        }
    });
  </script>
{% endblock %}

{% block submit_buttons_bottom %}
    {{ block.super }}

    {% if show_post_button %}
        <form method="post" style="display:inline;">{% csrf_token %}
            <button type="submit" name="_post_order" class="button btn-success"
                    style="margin-right: 10px; background-color: #007bff; color: white; padding: 8px 15px; border: none; border-radius: 4px;">
                📦 ترحيل أمر الإنتاج
            </button>
        </form>
    {% endif %}

    {% if show_unpost_button %}
        <form method="post" style="display:inline;">{% csrf_token %}
            <button type="submit" name="_unpost_order" class="button btn-danger"
                    style="margin-right: 10px; background-color: #dc3545; color: white; padding: 8px 15px; border: none; border-radius: 4px;">
                ⛔ إلغاء ترحيل الأمر
            </button>
        </form>
    {% endif %}
{% endblock %}
