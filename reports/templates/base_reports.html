<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}تقرير{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f6f7f9; padding: 20px; }
        .report-box { background: #fff; padding: 20px; border-radius: 6px; }
        /* ===== Report Main Header ===== */
.report-header {
    background: linear-gradient(90deg, #f8f9fa, #ffffff);
    border: 1px solid #e0e0e0;
    border-right: 6px solid #0d6efd;
    border-radius: 10px;
    padding: 18px 25px;
    margin: 10px 0 25px 0;
    text-align: center;
}

.report-header h1 {
    font-size: 34px;
    font-weight: 900;
    color: #0d6efd;
    margin: 0;
    line-height: 1.4;
}

.report-header .report-period {
    margin-top: 8px;
    font-size: 14px;
    color: #444;
    font-weight: 600;
}

.report-header .report-period span {
    color: #000;
    font-weight: 700;
}

    </style>
</head>
<body>
    <div class="d-flex justify-content-end mb-3 mt-2">
        <a href="/admin/" target="_top"
        class="btn btn-secondary btn-sm" style="font-weight: bold;">
            ⬅ الرجوع إلى لوحة التحكم
        </a>
    </div>

<div class="report-box">
    {% block filters %}{% endblock %}
    {% block content %}{% endblock %}
</div>

</body>
</html>
