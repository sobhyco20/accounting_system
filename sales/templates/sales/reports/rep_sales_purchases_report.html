<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body { font-family: Tahoma; padding: 20px; background: #f2f2f2; direction: rtl; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        form { margin-bottom: 20px; background: #fff; padding: 15px; border: 1px solid #ccc; border-radius: 8px; display: flex; align-items: center; flex-wrap: wrap; gap: 15px; }
        label { font-weight: bold; }
        input[type="date"], select { padding: 5px 10px; min-width: 180px; }
        button { padding: 6px 20px; background-color: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #135ca8; }

        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background-color: #1976d2; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        a.btn-export {
            padding: 6px 20px;
            background-color: #28a745;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            margin-right: 10px;
        }
        a.btn-export:hover {
            background-color: #1e7e34;
        }

    </style>
</head>
<body>

    <h2>{{ title }}</h2>

        <form method="get">
            <label for="start_date">📅 من تاريخ:</label>
            <input type="date" name="start_date" id="start_date" value="{{ request.GET.start_date|default:'2026-01-01' }}">

            <label for="end_date">📅 إلى تاريخ:</label>
            <input type="date" name="end_date" id="end_date" value="{{ request.GET.end_date|default:'2026-12-31' }}">

            <label for="rep">👤 المندوب:</label>
            <select name="rep" id="rep">
                <option value="">-- الكل --</option>
                {% for r in form.fields.rep.queryset %}
                    <option value="{{ r.id }}" {% if r.id|stringformat:"s" == request.GET.rep %}selected{% endif %}>{{ r.name }}</option>
                {% endfor %}
            </select>

            <button type="submit">🔍 عرض التقرير</button>

            <!-- ✅ زر تصدير Excel مع تمرير نفس الفلاتر -->
            <a href="?{% if request.GET %}{{ request.GET.urlencode }}&{% endif %}export=excel" class="btn-export">⬇️ تصدير Excel</a>
        </form>


    <table>
        <thead>
            <tr>
                <th>المندوب</th>
                <th>إجمالي المبيعات</th>
                <th>إجمالي المشتريات</th>
                <th>الفرق (صافي)</th>
            </tr>
        </thead>
        <tbody>
            {% for row in results %}
                <tr>
                    <td>{{ row.rep.name }}</td>
                    <td>{{ row.sales_total|floatformat:2 }}</td>
                    <td>{{ row.purchase_total|floatformat:2 }}</td>
                    <td>{{ row.net|floatformat:2 }}</td>
                </tr>
            {% empty %}
                <tr><td colspan="4" class="text-muted">لا توجد بيانات لعرضها</td></tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
