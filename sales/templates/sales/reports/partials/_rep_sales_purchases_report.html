<div class="container mt-4">
  <h2 class="mb-4 text-center">🧑‍💼 تقرير المندوبين (مبيعات + مشتريات)</h2>

  <form method="get" class="row gy-3 gx-4 align-items-end mb-4 bg-light p-4 rounded shadow-sm border">
    <input type="hidden" name="report" value="rep">

    <div class="col-md-3">
      <label class="form-label fw-bold">من تاريخ:</label>
      <input type="date" name="from_date" value="{{ from_date }}" class="form-control">
    </div>

    <div class="col-md-3">
      <label class="form-label fw-bold">إلى تاريخ:</label>
      <input type="date" name="to_date" value="{{ to_date }}" class="form-control">
    </div>

    <div class="col-md-4">
      <label class="form-label fw-bold">المندوب:</label>
      <select name="rep" class="form-select">
        <option value="">-- الكل --</option>
        {% for r in reps %}
          <option value="{{ r.id }}" {% if r.id|stringformat:"s" == rep|stringformat:"s" %}selected{% endif %}>
            {{ r.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-2 text-end">
      <button type="submit" class="btn btn-primary w-100">🔍 عرض</button>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table table-bordered table-striped text-center align-middle">
      <thead class="table-dark">
        <tr>
          <th>المندوب</th>
          <th>إجمالي المبيعات</th>
          <th>إجمالي المشتريات</th>
          <th>الصافي</th>
        </tr>
      </thead>
      <tbody>
        {% for row in results %}
          <tr>
            <td>{{ row.rep.name }}</td>
            <td class="text-end">{{ row.sales_total|floatformat:2 }}</td>
            <td class="text-end">{{ row.purchase_total|floatformat:2 }}</td>
            <td class="text-end fw-bold">{{ row.net|floatformat:2 }}</td>
          </tr>
        {% empty %}
          <tr><td colspan="4" class="text-muted">لا توجد بيانات.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
