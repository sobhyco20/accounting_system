<div class="container mt-4">
  <h2 class="mb-4 text-center">💰 تقرير المبيعات بالعميل</h2>

  <!-- 🔍 فلاتر -->
  <form method="get" class="row gy-3 gx-4 align-items-end mb-4 bg-light p-4 rounded shadow-sm border">

    <!-- مهم جداً لتثبيت التقرير داخل البورتال -->
    <input type="hidden" name="report" value="by_customer">

    <div class="col-md-3">
      <label class="form-label fw-bold">من تاريخ:</label>
      <input type="date" name="from_date"
             value="{{ from_date|default:'2026-01-01' }}"
             class="form-control">
    </div>

    <div class="col-md-3">
      <label class="form-label fw-bold">إلى تاريخ:</label>
      <input type="date" name="to_date"
             value="{{ to_date|default:'2026-12-31' }}"
             class="form-control">
    </div>

    <div class="col-md-3">
      <label class="form-label fw-bold">العميل:</label>
      <select name="customer" class="form-select">
        <option value="">-- كل العملاء --</option>
        {% for cust in customers %}
          <option value="{{ cust.id }}"
            {% if cust.id|stringformat:"s" == customer|stringformat:"s" %}selected{% endif %}>
            {{ cust.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-3 text-end">
      <div class="btn-group mt-3 mt-md-0">
        <button type="submit" class="btn btn-primary px-4">
          🔍 عرض التقرير
        </button>

        <a href="?report=by_customer&from_date={{ from_date|default:'2026-01-01' }}&to_date={{ to_date|default:'2026-12-31' }}&customer={{ customer }}&export=1"
           class="btn btn-success px-4">
          ⬇️ تصدير Excel
        </a>
      </div>
    </div>

  </form>

  <!-- 📊 جدول التقرير -->
  <div class="table-responsive">
    <table class="table table-bordered table-hover table-striped align-middle text-center">
      <thead class="table-dark">
        <tr>
          <th>رقم الفاتورة</th>
          <th>التاريخ</th>
          <th>العميل</th>
          <th>إجمالي الفاتورة</th>
        </tr>
      </thead>
      <tbody>
        {% for inv in invoices %}
          <tr>
            <td>{{ inv.number }}</td>
            <td>{{ inv.date }}</td>
            <td>{{ inv.customer }}</td>
            <td class="text-end">{{ inv.amount|floatformat:2 }}</td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="4" class="text-muted">
              لا توجد بيانات في الفترة المحددة.
            </td>
          </tr>
        {% endfor %}
      </tbody>

      <tfoot class="table-light fw-bold">
        <tr>
          <td colspan="3" class="text-end">الإجمالي:</td>
          <td class="text-end">{{ total_amount|floatformat:2 }}</td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>
