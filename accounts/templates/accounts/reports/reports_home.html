{% extends 'admin/base_site.html' %}
{% load static %}

{% block content %}
<style>
    body {
        overflow-x: hidden;
    }

    .reports-container {
        display: flex;
        height: calc(100vh - 120px);
        border: 1px solid #ccc;
        border-radius: 6px;
        overflow: hidden;
        background-color: #fff;
    }

    .reports-sidebar {
        flex: 0 0 260px;
        max-width: 260px;
        background-color: #f5f5f5;
        border-left: 1px solid #ccc;
        padding: 20px;
        overflow-y: auto;
    }

    .reports-sidebar h3 {
        font-size: 18px;
        margin-bottom: 20px;
        color: #333;
    }

    .reports-sidebar a {
        display: block;
        padding: 10px 15px;
        margin-bottom: 10px;
        background-color: #e9ecef;
        border-radius: 4px;
        color: #0056b3;
        font-weight: 500;
        text-decoration: none;
        transition: background-color 0.2s;
        cursor: default;
    }

    .reports-sidebar a:hover {
        background-color: #d4d8dd;
        text-decoration: none;
    }

    .reports-content {
        flex: 1;
        padding: 0;
        position: relative;
        overflow: hidden;
    }

    .reports-content iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }

    .report-buttons {
        margin: 20px 0 10px 0;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    .report-buttons .button {
        padding: 8px 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        text-decoration: none;
        font-weight: bold;
        transition: background-color 0.2s;
    }

    .report-buttons .button:hover {
        background-color: #0056b3;
    }

    @media (max-width: 768px) {
        .reports-container {
            flex-direction: column;
        }

        .reports-sidebar {
            width: 100%;
            max-width: 100%;
            border-left: none;
            border-bottom: 1px solid #ccc;
        }
    }
</style>

<h1>📘 تقارير الحسابات</h1>

<div class="report-buttons">
    <a href="{% url 'admin:index' %}" class="button">🔙 العودة للوحة التحكم</a>
    <button onclick="refreshReport()" class="button">🔄 تحديث التقرير</button>
</div>

<div class="reports-container">
    <div class="reports-sidebar">
        <h3>📑 قائمة التقارير</h3>
        <a onclick="loadReport('{% url "accounts:ledger_report" %}')">📜 كشف حساب</a>
        <a onclick="loadReport('{% url "accounts:trial_balance" %}')">📘 ميزان المراجعة</a>
        <a onclick="loadReport('{% url "accounts:income_statement" %}')">💼 قائمة الدخل</a>
        <a onclick="loadReport('{% url "accounts:balance_sheet" %}')">🏦 الميزانية العمومية</a>
        <a onclick="loadReport('{% url "accounts:cash_flow_report" %}')">💰 تقرير التدفقات النقدية</a>
        <a onclick="loadReport('{% url "accounts:financial_statement_report" %}')">📋 تقرير حسب نوع القائمة المالية</a>
        <a onclick="loadReport('{% url "accounts:vat_report" %}')">🧾 تقرير ضريبة القيمة المضافة</a>
    </div>
    <div class="reports-content">
        <iframe id="reportFrame" src=""></iframe>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        loadReport("{% url 'accounts:ledger_report' %}");
    });

    function loadReport(url) {
        const frame = document.getElementById("reportFrame");
        frame.src = url;
        sessionStorage.setItem("currentAccountsReport", url);
    }

    function refreshReport() {
        const url = sessionStorage.getItem("currentAccountsReport");
        if (url) {
            document.getElementById("reportFrame").src = url;
        }
    }
</script>
{% endblock %}
