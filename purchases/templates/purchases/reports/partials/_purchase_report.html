<div class="container mt-4">
  <h2 class="mb-4 text-center">📄 تقرير المشتريات</h2>

  <form method="get" class="row gy-3 gx-4 align-items-end mb-4 bg-light p-4 rounded shadow-sm border">
    <input type="hidden" name="report" value="purchases">

    <div class="col-md-4">
      <label class="form-label fw-bold">من تاريخ:</label>
      <input type="date" name="from_date" value="{{ from_date }}" class="form-control">
    </div>

    <div class="col-md-4">
      <label class="form-label fw-bold">إلى تاريخ:</label>
      <input type="date" name="to_date" value="{{ to_date }}" class="form-control">
    </div>

    <div class="col-md-4 text-end">
      <button type="submit" class="btn btn-primary px-4">🔍 عرض التقرير</button>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table table-bordered table-hover table-striped align-middle text-center">
      <thead class="table-dark">
        <tr>
          <th>رقم الفاتورة</th>
          <th>تاريخ الفاتورة</th>
          <th>المورد</th>
          <th>إجمالي الفاتورة</th>
        </tr>
      </thead>
      <tbody>
        {% for inv in invoices %}
          <tr>
            <td>{{ inv.number }}</td>
            <td>{{ inv.date }}</td>
            <td>{{ inv.supplier }}</td>
            <td class="text-end">{{ inv.amount|floatformat:2 }}</td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="4" class="text-muted">لا توجد بيانات في الفترة المحددة.</td>
          </tr>
        {% endfor %}
      </tbody>
      <tfoot class="table-light fw-bold">
        <tr>
          <td colspan="3" class="text-end">الإجمالي:</td>
          <td class="text-end">{{ total_amount|floatformat:2 }}</td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>
